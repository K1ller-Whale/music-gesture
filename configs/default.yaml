# Music Gesture - default configuration
# Values follow the CVPR 2020 paper where specified; the rest are reasonable defaults.

experiment:
  name: music_gesture_music21
  seed: 1234
  output_dir: runs

data:
  root: datasets/processed
  train_index: datasets/processed/train.csv
  val_index: datasets/processed/val.csv
  num_mix: 2                # N in Mix-and-Separate (paper trains with 2)
  categories: 21            # MUSIC-21

audio:
  sample_rate: 11025
  clip_seconds: 6.0
  n_fft: 1022
  hop_length: 256
  win_length: 1022
  n_freq: 512               # STFT freq bins (n_fft/2)
  log_freq: true            # warp to log-frequency scale
  n_log_freq: 256
  mask_type: ratio          # {binary, ratio}
  clip_grad: 5.0

video:
  fps: 8
  num_frames: 48            # 6s * 8fps
  frame_size: 224
  body_joints: 18           # OpenPose COCO body
  hand_joints: 21           # per hand
  num_people_max: 2

model:
  audio:
    ngf: 64
    num_downs: 7
    input_nc: 1
    output_nc: 1
  context:
    backbone: resnet50
    pretrained: true
    feat_dim: 512
  pose:
    in_channels: 3          # (x, y, confidence)
    graph_layers: [64, 64, 64, 128, 128, 256]
    temporal_kernel: 9
    dropout: 0.1
    embed_dim: 512
  fusion:
    dim: 512
    depth: 3
    heads: 8
    mlp_ratio: 4.0
    dropout: 0.1

train:
  batch_size: 16
  num_workers: 8
  epochs: 100
  lr: 0.001
  lr_backbone: 0.0001
  weight_decay: 0.0001
  lr_steps: [40, 80]
  lr_gamma: 0.1
  log_interval: 20
  ckpt_interval: 1

eval:
  metrics: [sdr, sir, sar]
